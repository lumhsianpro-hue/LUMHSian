name: Daily Database Backup

# Runs automatically every day at 11:00 PM Pakistan time (18:00 UTC).
# Free â€” uses GitHub's free Actions minutes, no extra cost.
on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:   # lets you also click "Run workflow" manually anytime to test

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump the database
        run: |
          mkdir -p backup_output
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" \
            --no-owner --no-privileges \
            -f "backup_output/backup-$(date +%Y-%m-%d).sql"

      - name: Push backup to private backup repo
        env:
          TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/${{ secrets.BACKUP_REPO }}.git backup_repo
          cp backup_output/*.sql backup_repo/
          cd backup_repo
          git config user.name "LUMHSian Pro Backup Bot"
          git config user.email "backup-bot@noreply.local"
          git add .
          git commit -m "Backup $(date +%Y-%m-%d)" || echo "Nothing new to commit"
          git push
